<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Alfred's Holiday — Bestiary</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
      --ink:#2a2622;--paper:#efe7d6;--dim:rgba(42,38,34,.6)}
html,body{margin:0;background:var(--paper)}
body{font-family:ui-sans-serif,system-ui,"Segoe UI",sans-serif;color:var(--ink);
     padding:34px 20px 60px}
h1{font-family:var(--serif);font-weight:400;text-align:center;letter-spacing:.3em;
   text-indent:.3em;font-size:clamp(22px,4.4vw,36px);margin:0 0 6px}
.sub{font-family:var(--serif);font-style:italic;text-align:center;color:var(--dim);
     letter-spacing:.2em;margin:0 0 34px;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:22px;max-width:1060px;margin:0 auto}
.tile{border:1px solid rgba(42,38,34,.22);border-radius:8px;overflow:hidden;
      background:var(--paper)}
.tile canvas{display:block;width:100%;height:auto}
.cap{padding:10px 12px 12px;border-top:1px solid rgba(42,38,34,.14)}
.cap b{font-family:var(--serif);font-weight:400;font-size:15px;letter-spacing:.08em;display:block}
.cap span{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
</style>
<h1>THE BESTIARY</h1>
<p class="sub">the company alfred keeps &mdash; each drawn in ink, live</p>
<div class="grid" id="grid"></div>
<h1 style="margin-top:52px">THE SKIES</h1>
<p class="sub">one sky-body per level &mdash; it rises on the right and sets as the level ends</p>
<div class="grid" id="grid2"></div>
<script>
'use strict';
const INK=[42,38,34],PAPER=[239,231,214],VERM=[193,75,50];
const rand=(a,b)=>a+Math.random()*(b-a);
function lerpC(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]}
function css(c,a){return'rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+','+(a==null?1:a)+')'}
function hueRGB(h){h=((h%1)+1)%1;
  const f=n=>{const k=(n+h*6)%6;return 255*(1-Math.max(0,Math.min(k,4-k,1)))|0};
  return[f(5),f(3),f(1)];}
function dotG(ctx,x,y,r,col,a){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,css(col,a));g.addColorStop(1,css(col,0));
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,6.283);ctx.fill();
}
/* ---- painters, identical to the game's ---- */
function drawCrane(ctx,x,y,s,ph){
  const flap=Math.sin(ph);
  ctx.strokeStyle=css(INK,.75);ctx.lineCap='round';
  ctx.lineWidth=Math.max(1.1,s*.09);
  ctx.beginPath();ctx.moveTo(x-s*.5,y+s*.06);
  ctx.quadraticCurveTo(x,y-s*.08,x+s*.42,y-s*.02);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+s*.42,y-s*.02);
  ctx.quadraticCurveTo(x+s*.75,y-s*.28,x+s*.95,y-s*.34);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+s*.95,y-s*.34);ctx.lineTo(x+s*1.12,y-s*.3);ctx.stroke();
  ctx.lineWidth=Math.max(.8,s*.05);
  ctx.beginPath();ctx.moveTo(x-s*.45,y+s*.05);ctx.lineTo(x-s*.85,y+s*.16);ctx.stroke();
  ctx.lineWidth=Math.max(1.2,s*.11);
  const wy1=-s*(.55+.35*flap),wy2=-s*(.15+.5*flap);
  ctx.beginPath();ctx.moveTo(x+s*.05,y-s*.05);
  ctx.quadraticCurveTo(x-s*.15,y+wy1*.6,x-s*.55,y+wy1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+s*.08,y-s*.02);
  ctx.quadraticCurveTo(x-s*.1,y+wy2*.6,x-s*.5,y+wy2);ctx.stroke();
  ctx.fillStyle=css(VERM,.9);
  ctx.beginPath();ctx.arc(x+s*.93,y-s*.36,Math.max(1,s*.045),0,6.283);ctx.fill();
}
function drawKoi(ctx,x,y,s,ph){
  const wag=Math.sin(ph);
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(ph*.5)*.12);
  ctx.strokeStyle=css(INK,.7);ctx.lineCap='round';
  ctx.lineWidth=s*.3;
  ctx.beginPath();ctx.moveTo(s*.45,0);
  ctx.quadraticCurveTo(0,wag*s*.12,-s*.4,wag*s*.2);ctx.stroke();
  ctx.lineWidth=s*.12;
  ctx.beginPath();ctx.moveTo(-s*.4,wag*s*.2);ctx.lineTo(-s*.68,wag*s*.2-s*.16);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-s*.4,wag*s*.2);ctx.lineTo(-s*.66,wag*s*.2+s*.14);ctx.stroke();
  ctx.fillStyle=css(VERM,.75);
  ctx.beginPath();ctx.ellipse(s*.18,-s*.03,s*.16,s*.1,0,0,6.283);ctx.fill();
  ctx.restore();
}
function drawPanda(ctx,x,y,s,ph){
  const dk=INK;
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(ph)*.08);
  ctx.fillStyle=css([250,246,236],.96);
  ctx.beginPath();ctx.ellipse(0,s*.28,s*.62,s*.5,0,0,6.283);ctx.fill();
  ctx.strokeStyle=css(dk,.5);ctx.lineWidth=1.2;
  ctx.beginPath();ctx.ellipse(0,s*.28,s*.62,s*.5,0,0,6.283);ctx.stroke();
  ctx.fillStyle=css(dk,.9);
  ctx.beginPath();ctx.ellipse(-s*.5,s*.1,s*.2,s*.34,.5,0,6.283);ctx.fill();
  ctx.beginPath();ctx.ellipse(s*.5,s*.1,s*.2,s*.34,-.5,0,6.283);ctx.fill();
  ctx.beginPath();ctx.arc(-s*.3,s*.68,s*.17,0,6.283);ctx.fill();
  ctx.beginPath();ctx.arc(s*.3,s*.68,s*.17,0,6.283);ctx.fill();
  ctx.fillStyle=css([250,246,236],.98);
  ctx.beginPath();ctx.arc(0,-s*.42,s*.5,0,6.283);ctx.fill();
  ctx.strokeStyle=css(dk,.5);
  ctx.beginPath();ctx.arc(0,-s*.42,s*.5,0,6.283);ctx.stroke();
  ctx.fillStyle=css(dk,.95);
  ctx.beginPath();ctx.arc(-s*.36,-s*.8,s*.16,0,6.283);ctx.fill();
  ctx.beginPath();ctx.arc(s*.36,-s*.8,s*.16,0,6.283);ctx.fill();
  ctx.beginPath();ctx.ellipse(-s*.19,-s*.4,s*.11,s*.15,.35,0,6.283);ctx.fill();
  ctx.beginPath();ctx.ellipse(s*.19,-s*.4,s*.11,s*.15,-.35,0,6.283);ctx.fill();
  ctx.beginPath();ctx.arc(0,-s*.24,s*.055,0,6.283);ctx.fill();
  ctx.strokeStyle=css(lerpC([110,170,120],dk,.25),.85);
  ctx.lineWidth=Math.max(1,s*.06);
  ctx.beginPath();ctx.moveTo(s*.34,s*.02);ctx.lineTo(s*.62,-s*.34);ctx.stroke();
  ctx.strokeStyle=css([110,170,120],.8);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(s*.56,-s*.26);ctx.lineTo(s*.72,-s*.36);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*.56,-s*.26);ctx.lineTo(s*.7,-s*.2);ctx.stroke();
  ctx.restore();
}
function drawCat(ctx,x,y,s,ph){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(ph*.7)*.05);
  ctx.strokeStyle=css(INK,.85);ctx.lineCap='round';ctx.lineWidth=Math.max(1.2,s*.12);
  ctx.beginPath();ctx.moveTo(s*.42,s*.3);
  ctx.quadraticCurveTo(s*.78,s*.1+Math.sin(ph)*s*.12,s*.62,-s*.24+Math.sin(ph)*s*.2);
  ctx.stroke();
  ctx.fillStyle=css(INK,.85);
  ctx.beginPath();ctx.ellipse(0,s*.16,s*.5,s*.42,0,0,6.283);ctx.fill();
  ctx.beginPath();ctx.arc(0,-s*.38,s*.3,0,6.283);ctx.fill();
  ctx.beginPath();ctx.moveTo(-s*.26,-s*.5);ctx.lineTo(-s*.16,-s*.78);
  ctx.lineTo(-s*.02,-s*.56);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(s*.26,-s*.5);ctx.lineTo(s*.16,-s*.78);
  ctx.lineTo(s*.02,-s*.56);ctx.closePath();ctx.fill();
  ctx.fillStyle=css(VERM,.9);
  ctx.beginPath();ctx.arc(-s*.11,-s*.4,s*.045,0,6.283);ctx.fill();
  ctx.beginPath();ctx.arc(s*.11,-s*.4,s*.045,0,6.283);ctx.fill();
  ctx.restore();
}
function drawMount(ctx,x,y,s,ph,goat,TINT){
  ctx.save();ctx.translate(x,y);
  dotG(ctx,0,s*.5,s*.9,TINT,.16);
  ctx.fillStyle=css(lerpC(TINT,INK,.55),.8);
  ctx.beginPath();ctx.moveTo(-s*.9,s*.5);ctx.lineTo(-s*.1,-s*.75);
  ctx.lineTo(s*.5,s*.5);ctx.closePath();ctx.fill();
  ctx.fillStyle=css(lerpC(TINT,INK,.4),.55);
  ctx.beginPath();ctx.moveTo(s*.05,s*.5);ctx.lineTo(s*.5,-s*.3);
  ctx.lineTo(s*.95,s*.5);ctx.closePath();ctx.fill();
  ctx.strokeStyle=css(INK,.4);ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(-s*.9,s*.5);ctx.lineTo(-s*.1,-s*.75);ctx.stroke();
  if(goat){
    const u=.08+.1*(.5+.5*Math.sin(ph*.9));
    const gx=-s*.1-u*s*.8,gy=-s*.75+u*s*1.25,gs=Math.max(7,s*.16);
    const step=Math.sin(ph*5)*gs*.14;
    ctx.save();ctx.translate(gx,gy);ctx.rotate(-.28);
    ctx.fillStyle=css([245,242,232],.95);
    ctx.beginPath();ctx.ellipse(0,-gs*.3,gs*.5,gs*.32,0,0,6.283);ctx.fill();
    ctx.beginPath();ctx.arc(gs*.5,-gs*.52,gs*.22,0,6.283);ctx.fill();
    ctx.strokeStyle=css(INK,.8);ctx.lineWidth=Math.max(1,gs*.09);
    ctx.beginPath();ctx.moveTo(-gs*.3+step,0);ctx.lineTo(-gs*.3+step,gs*.34);ctx.stroke();
    ctx.beginPath();ctx.moveTo(gs*.28-step,0);ctx.lineTo(gs*.28-step,gs*.34);ctx.stroke();
    ctx.beginPath();ctx.moveTo(gs*.6,-gs*.72);
    ctx.quadraticCurveTo(gs*.42,-gs*1.02,gs*.22,-gs*.88);ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}
function drawWhale(ctx,x,y,s,ph,TINT){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(ph*.4)*.04);
  ctx.fillStyle=css(lerpC(TINT,INK,.5),.45);
  ctx.beginPath();ctx.moveTo(-s*.9,0);
  ctx.quadraticCurveTo(-s*.2,-s*.42,s*.55,-s*.12);
  ctx.quadraticCurveTo(s*.9,s*.02,s*.75,s*.1);
  ctx.quadraticCurveTo(0,s*.28,-s*.9,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-s*.88,0);ctx.lineTo(-s*1.1,-s*.18);
  ctx.lineTo(-s*.96,0);ctx.lineTo(-s*1.08,s*.14);ctx.closePath();ctx.fill();
  ctx.fillStyle=css(VERM,.7);
  ctx.beginPath();ctx.arc(s*.52,-s*.04,Math.max(1.4,s*.02),0,6.283);ctx.fill();
  ctx.restore();
}
function drawNarwhal(ctx,x,y,s,ph,TINT){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(ph*.4)*.05);
  ctx.fillStyle=css(lerpC(TINT,INK,.45),.45);
  ctx.beginPath();ctx.moveTo(-s*.8,0);
  ctx.quadraticCurveTo(-s*.15,-s*.3,s*.5,-s*.08);
  ctx.quadraticCurveTo(s*.8,0,s*.68,s*.06);
  ctx.quadraticCurveTo(0,s*.2,-s*.8,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-s*.78,0);ctx.lineTo(-s*.98,-s*.14);
  ctx.lineTo(-s*.86,0);ctx.lineTo(-s*.96,s*.12);ctx.closePath();ctx.fill();
  ctx.strokeStyle=css(INK,.6);ctx.lineWidth=Math.max(1.2,s*.028);
  ctx.beginPath();ctx.moveTo(s*.5,-s*.07);ctx.lineTo(s*1.12,-s*.24);ctx.stroke();
  ctx.fillStyle=css(lerpC(TINT,INK,.5),.5);
  ctx.beginPath();ctx.ellipse(s*.05,-s*.2,s*.14,s*.06,-.6,0,6.283);ctx.fill();
  ctx.beginPath();ctx.ellipse(-s*.05,s*.12,s*.16,s*.07,.5+Math.sin(ph*2)*.15,0,6.283);ctx.fill();
  ctx.fillStyle=css(VERM,.7);
  ctx.beginPath();ctx.arc(s*.46,-s*.02,Math.max(1.2,s*.018),0,6.283);ctx.fill();
  ctx.restore();
}
function drawWeird(ctx,x,y,s,ph){
  ctx.save();ctx.translate(x,y+Math.sin(ph*.8)*5);
  ctx.fillStyle=css(lerpC([150,220,160],INK,.25),.55);
  ctx.beginPath();
  for(let k=0;k<=10;k++){
    const a=k/10*6.283,rr=s*(.34+.14*Math.sin(a*3+ph*1.4)+.08*Math.sin(a*7-ph));
    if(k)ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr*.8);
    else ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr*.8);
  }
  ctx.closePath();ctx.fill();
  ctx.strokeStyle=css(INK,.5);ctx.lineWidth=1.2;ctx.stroke();
  for(let k=0;k<3;k++){
    const a=-2.2+k*1.05,L=s*(.5+.18*k),wob=Math.sin(ph*1.6+k*2)*.3;
    const ex=Math.cos(a+wob)*L,ey=Math.sin(a+wob)*L*.9-s*.1;
    ctx.strokeStyle=css(INK,.55);ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*s*.2,Math.sin(a)*s*.16);
    ctx.quadraticCurveTo(ex*.6,ey*.6-s*.1,ex,ey);ctx.stroke();
    ctx.fillStyle=css(lerpC(PAPER,[255,255,255],.3),.9);
    ctx.beginPath();ctx.arc(ex,ey,s*.1,0,6.283);ctx.fill();
    if(Math.sin(ph*1.1+k*2.4)>-.6){
      ctx.fillStyle=css(VERM,.9);
      ctx.beginPath();ctx.arc(ex+Math.cos(ph+k)*s*.03,ey+Math.sin(ph+k)*s*.03,s*.05,0,6.283);ctx.fill();
    }
    ctx.strokeStyle=css(INK,.5);ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(ex,ey,s*.1,0,6.283);ctx.stroke();
  }
  for(let k=0;k<4;k++){
    const tx=-s*.2+k*s*.13;
    ctx.strokeStyle=css(INK,.4);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(tx,s*.25);
    ctx.quadraticCurveTo(tx+Math.sin(ph*2+k)*s*.1,s*.5,tx+Math.sin(ph*2+k+1)*s*.08,s*.7);
    ctx.stroke();
  }
  ctx.restore();
}
function drawManatee(ctx,x,y,s,ph,TINT){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(ph*.5)*.06);
  ctx.fillStyle=css(lerpC(TINT,INK,.4),.5);
  ctx.beginPath();ctx.ellipse(0,0,s*.62,s*.34,0,0,6.283);ctx.fill();
  ctx.beginPath();ctx.ellipse(s*.52,-s*.06,s*.22,s*.18,0,0,6.283);ctx.fill();
  ctx.beginPath();ctx.ellipse(-s*.66,0,s*.16,s*.1,Math.sin(ph)*.4,0,6.283);ctx.fill();
  ctx.beginPath();ctx.ellipse(s*.1,s*.3,s*.14,s*.07,.6+Math.sin(ph*2)*.2,0,6.283);ctx.fill();
  ctx.fillStyle=css(VERM,.7);
  ctx.beginPath();ctx.arc(s*.58,-s*.1,Math.max(1.2,s*.02),0,6.283);ctx.fill();
  ctx.strokeStyle=css(INK,.75);ctx.lineCap='round';
  ctx.lineWidth=Math.max(1.4,s*.045);
  ctx.beginPath();ctx.moveTo(s*.6,s*.06);ctx.lineTo(s*.56,s*.24);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*.68,s*.05);ctx.lineTo(s*.66,s*.22);ctx.stroke();
  ctx.restore();
}
function drawSquid(ctx,x,y,s,ph){
  ctx.save();ctx.translate(x,y+Math.sin(ph)*5);ctx.rotate(Math.sin(ph*.6)*.1);
  ctx.fillStyle=css(lerpC([170,150,230],PAPER,.3),.55);
  ctx.beginPath();ctx.moveTo(0,-s*.7);
  ctx.quadraticCurveTo(s*.34,-s*.2,s*.22,s*.05);
  ctx.lineTo(-s*.22,s*.05);
  ctx.quadraticCurveTo(-s*.34,-s*.2,0,-s*.7);ctx.closePath();ctx.fill();
  ctx.strokeStyle=css(INK,.55);ctx.lineWidth=1.2;ctx.stroke();
  for(let k=0;k<5;k++){
    const tx=-s*.18+k*s*.09;
    ctx.beginPath();ctx.moveTo(tx,s*.05);
    ctx.quadraticCurveTo(tx+Math.sin(ph*2.4+k)*s*.14,s*.34,
      tx+Math.sin(ph*2.4+k+2)*s*.1,s*.58);
    ctx.stroke();
  }
  ctx.fillStyle=css(VERM,.85);
  ctx.beginPath();ctx.arc(-s*.08,-s*.24,s*.05,0,6.283);ctx.fill();
  ctx.beginPath();ctx.arc(s*.08,-s*.24,s*.05,0,6.283);ctx.fill();
  ctx.restore();
}
function drawEye(ctx,x,y,s,ph){
  ctx.save();ctx.translate(x,y+Math.sin(ph)*4);
  const blink=Math.max(0,Math.sin(ph*.9));
  ctx.fillStyle=css(lerpC(PAPER,[255,255,255],.3),.9);
  ctx.beginPath();ctx.ellipse(0,0,s*.5,s*.5*Math.max(.12,blink),0,0,6.283);ctx.fill();
  ctx.strokeStyle=css(INK,.6);ctx.lineWidth=1.3;ctx.stroke();
  if(blink>.3){
    ctx.fillStyle=css(VERM,.85);
    ctx.beginPath();ctx.arc(Math.sin(ph*.5)*s*.14,0,s*.16*blink,0,6.283);ctx.fill();
    ctx.fillStyle=css(INK,.9);
    ctx.beginPath();ctx.arc(Math.sin(ph*.5)*s*.14,0,s*.07*blink,0,6.283);ctx.fill();
  }
  ctx.restore();
}
function drawJelly(ctx,x,y,s,ph){
  ctx.save();ctx.translate(x,y+Math.sin(ph)*4);
  ctx.fillStyle=css(lerpC([140,220,170],PAPER,.3),.6);
  ctx.beginPath();ctx.arc(0,0,s*.5,Math.PI,0);
  ctx.quadraticCurveTo(s*.25,s*.12,0,s*.08);
  ctx.quadraticCurveTo(-s*.25,s*.12,-s*.5,0);ctx.closePath();ctx.fill();
  ctx.strokeStyle=css(INK,.55);ctx.lineWidth=1.3;ctx.stroke();
  ctx.lineWidth=1.2;
  for(let k=0;k<4;k++){
    const tx=-s*.3+k*s*.2;
    ctx.beginPath();ctx.moveTo(tx,s*.06);
    ctx.quadraticCurveTo(tx+Math.sin(ph*2+k)*s*.16,s*.36,tx+Math.sin(ph*2+k+1)*s*.1,s*.62);
    ctx.stroke();
  }
  ctx.fillStyle=css(VERM,.85);
  ctx.beginPath();ctx.arc(0,-s*.12,s*.09,0,6.283);ctx.fill();
  ctx.restore();
}
function drawSaucer(ctx,x,y,s,ph){
  ctx.save();ctx.translate(x,y+Math.sin(ph)*5);ctx.rotate(Math.sin(ph*.8)*.06);
  ctx.fillStyle=css(lerpC(PAPER,INK,.2),.6);
  ctx.beginPath();ctx.arc(0,-s*.1,s*.26,Math.PI,0);ctx.closePath();ctx.fill();
  ctx.strokeStyle=css(INK,.6);ctx.lineWidth=1.2;ctx.stroke();
  ctx.fillStyle=css(INK,.8);
  ctx.beginPath();ctx.ellipse(0,0,s*.62,s*.18,0,0,6.283);ctx.fill();
  for(let k=-1;k<2;k++){
    ctx.fillStyle=css(VERM,.4+.5*Math.sin(ph*3+k));
    ctx.beginPath();ctx.arc(k*s*.3,s*.06,s*.06,0,6.283);ctx.fill();
  }
  ctx.restore();
}
function drawLantern(ctx,x,y,s,ph){
  ctx.save();ctx.translate(x,y+Math.sin(ph*.8)*4);ctx.rotate(Math.sin(ph)*.14);
  ctx.fillStyle=css(lerpC(VERM,PAPER,.25),.5);
  ctx.beginPath();ctx.ellipse(0,0,s*.62,s*.8,0,0,6.283);ctx.fill();
  ctx.strokeStyle=css(INK,.55);ctx.lineWidth=1.2;
  ctx.beginPath();ctx.ellipse(0,0,s*.62,s*.8,0,0,6.283);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-s*.5,-s*.25);ctx.quadraticCurveTo(0,-s*.38,s*.5,-s*.25);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-s*.5,s*.25);ctx.quadraticCurveTo(0,s*.38,s*.5,s*.25);ctx.stroke();
  ctx.fillStyle=css(INK,.7);
  ctx.fillRect(-s*.2,-s*.92,s*.4,s*.14);
  ctx.fillRect(-s*.14,s*.78,s*.28,s*.12);
  ctx.fillStyle=css(VERM,.9);
  ctx.beginPath();ctx.arc(0,s*.1,s*.12,0,6.283);ctx.fill();
  ctx.restore();
}
function drawBlossom(ctx,x,y,s,ph){
  ctx.save();ctx.translate(x,y);ctx.rotate(ph*.3);
  ctx.fillStyle=css(lerpC(VERM,PAPER,.4),.75);
  for(let k=0;k<5;k++){
    const a=k/5*6.283;
    ctx.beginPath();
    ctx.ellipse(Math.cos(a)*s*.55,Math.sin(a)*s*.55,s*.5,s*.3,a,0,6.283);ctx.fill();
  }
  ctx.fillStyle=css(VERM,.85);
  ctx.beginPath();ctx.arc(0,0,s*.16,0,6.283);ctx.fill();
  ctx.restore();
}
function drawLily(ctx,x,y,s,ph,TINT){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(ph)*.06);
  ctx.fillStyle=css(lerpC(TINT,INK,.3),.5);
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.arc(0,0,s,ph*.1+.4,ph*.1+6.05);ctx.closePath();ctx.fill();
  ctx.fillStyle=css(lerpC(VERM,PAPER,.5),.8);
  for(let k=0;k<3;k++){
    ctx.beginPath();
    ctx.ellipse((k-1)*s*.22,-s*.34,s*.16,s*.34,(k-1)*.35,0,6.283);ctx.fill();
  }
  ctx.fillStyle=css(VERM,.8);
  ctx.beginPath();ctx.arc(0,-s*.2,s*.08,0,6.283);ctx.fill();
  ctx.restore();
}
function drawAstT(ctx,x,y,s,ph,TINT){
  ctx.save();ctx.translate(x,y);ctx.rotate(ph*.5);
  ctx.beginPath();
  for(let k=0;k<7;k++){
    const ag=k/7*6.283,rr=s*(.75+.25*Math.sin(4.2*3+k*2.7));
    if(k)ctx.lineTo(Math.cos(ag)*rr,Math.sin(ag)*rr);
    else ctx.moveTo(Math.cos(ag)*rr,Math.sin(ag)*rr);
  }
  ctx.closePath();
  ctx.fillStyle=css(lerpC(TINT,INK,.6),.8);ctx.fill();
  ctx.strokeStyle=css(INK,.5);ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

function drawSky(ctx,t,x,y,R,time){
  if(t===0||t===4||t===6||t===8){
    const col=t===0?VERM:t===4?[224,176,96]:t===6?[236,236,245]:[250,180,95];
    const r=t===6?R*.7:R;
    dotG(ctx,x,y,r*1.8,col,.35);
    ctx.fillStyle=css(col,.85);
    ctx.beginPath();ctx.arc(x,y,r,0,6.283);ctx.fill();
    if(t===8){
      for(let k=0;k<5;k++){
        const q=(time*.25+k/5)%1;
        ctx.strokeStyle=css(hueRGB(q+time*.05),.55*(1-q));
        ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(x,y,r*(1.12+q*1.4),0,6.283);ctx.stroke();
      }
    }else{
      if(t===4){ctx.strokeStyle=css([110,170,120],.4);ctx.lineWidth=2;}
      else{ctx.strokeStyle=css(INK,.16);ctx.lineWidth=1.5;}
      ctx.beginPath();ctx.arc(x,y,r*1.3,0,6.283);ctx.stroke();
    }
  }else if(t===1){
    const col=[205,212,222];
    dotG(ctx,x,y,R*1.9,col,.3);
    ctx.fillStyle=css(col,.8);
    ctx.beginPath();ctx.arc(x,y,R*1.05,0,6.283);ctx.fill();
    ctx.fillStyle=css(lerpC(col,INK,.18),.5);
    ctx.beginPath();ctx.arc(x-R*.3,y-R*.2,R*.22,0,6.283);ctx.fill();
    ctx.beginPath();ctx.arc(x+R*.25,y+R*.3,R*.15,0,6.283);ctx.fill();
    ctx.strokeStyle=css(INK,.14);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(x,y,R*1.05,0,6.283);ctx.stroke();
  }else if(t===2){
    ctx.save();ctx.globalAlpha=.75;drawBlossom(ctx,x,y,R*1.5,time*.15);ctx.restore();
    dotG(ctx,x,y,R*2.2,[235,140,160],.25);
  }else if(t===3){
    ctx.save();ctx.globalAlpha=.85;drawLantern(ctx,x,y,R*1.1,time*.5);ctx.restore();
    dotG(ctx,x,y,R*2,[224,150,110],.25);
  }else if(t===5){
    const col=[190,182,196];
    dotG(ctx,x,y,R*1.7,col,.3);
    ctx.fillStyle=css(col,.9);
    ctx.beginPath();
    ctx.arc(x,y,R,-1.92,1.92,false);
    ctx.arc(x+R*.5,y,R*.72,1.6,-1.6,true);
    ctx.closePath();ctx.fill();
  }else if(t===7){
    dotG(ctx,x,y,R*2,[190,180,170],.3);
    ctx.fillStyle=css(INK,.85);
    ctx.beginPath();ctx.arc(x,y,R,0,6.283);ctx.fill();
    ctx.strokeStyle=css(VERM,.7);ctx.lineWidth=2.2;
    ctx.beginPath();ctx.arc(x,y,R*1.06,0,6.283);ctx.stroke();
  }else{
    const a=time*.25,sep=R*1.1,col=[120,200,150];
    for(const sgn of[1,-1]){
      const mx=x+Math.cos(a)*sep*sgn,myy=y+Math.sin(a)*sep*.4*sgn;
      dotG(ctx,mx,myy,R*1.1,col,.3);
      ctx.fillStyle=css(col,.8);
      ctx.beginPath();ctx.arc(mx,myy,R*.5,0,6.283);ctx.fill();
      ctx.strokeStyle=css(INK,.18);ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(mx,myy,R*.5,0,6.283);ctx.stroke();
    }
  }
}
