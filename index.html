<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Alfred's Holiday</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
:root{
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --ui:#cfd8ff; --ui-dim:rgba(207,216,255,.58); --ui-faint:rgba(207,216,255,.3);
  --bg:#050312; --btn-bg:rgba(207,216,255,.07); --btn-br:rgba(207,216,255,.2);
  --glow:0 0 34px rgba(150,170,255,.4);
}
body.ink{
  --ui:#2a2622; --ui-dim:rgba(42,38,34,.62); --ui-faint:rgba(42,38,34,.34);
  --bg:#efe7d6; --btn-bg:rgba(42,38,34,.05); --btn-br:rgba(42,38,34,.24);
  --glow:none;
}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:ui-sans-serif,system-ui,"Segoe UI",sans-serif;-webkit-user-select:none;user-select:none;
     -webkit-tap-highlight-color:transparent}
#cv{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:pointer}
#hud{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity 1.6s}
body.playing #hud{opacity:1}
#tl{position:absolute;top:22px;left:26px;display:flex;flex-direction:column;gap:4px}
#dist{font-family:var(--serif);font-size:30px;color:var(--ui);font-variant-numeric:tabular-nums;
      text-shadow:var(--glow)}
#ember{width:92px;height:3px;background:var(--btn-br);border-radius:2px;overflow:hidden;margin-top:3px}
#ember i{display:block;height:100%;width:100%;background:var(--ui-dim);transform-origin:left;
         transition:transform .2s linear,background .5s}
body.low #ember i{background:#e0745a}
#best{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ui-faint)}
#combo{font-size:12px;letter-spacing:.16em;color:var(--ui-dim);opacity:0;transition:opacity .5s}
#combo.on{opacity:1}
#buffs{font-size:11px;letter-spacing:.16em;color:var(--ui-dim);opacity:0;transition:opacity .5s}
#buffs.on{opacity:1}
#touch{display:none}
@media (pointer:coarse){#touch{display:block}}
.tcluster{position:absolute;bottom:18px;display:flex;gap:14px}
.tcluster.left{left:20px}
.tcluster.right{right:20px;flex-direction:column}
.startrow{display:none;gap:14px;margin-top:10px}
.sbtn{pointer-events:auto;background:var(--btn-bg);border:1px solid var(--btn-br);color:var(--ui);
  padding:10px 22px;border-radius:22px;font-size:12px;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;font-family:inherit;transition:color .3s,border-color .3s}
.sbtn:hover{border-color:var(--ui-dim)}
.sbtn:focus-visible{outline:2px solid var(--ui-dim);outline-offset:2px}
.tbtn{pointer-events:auto;width:56px;height:56px;border-radius:50%;
  background:var(--btn-bg);border:1px solid var(--btn-br);color:var(--ui-dim);
  font-size:20px;line-height:1;touch-action:none;-webkit-user-select:none;user-select:none}
#tr{position:absolute;top:22px;right:26px;display:flex;gap:12px;align-items:center}
#lumens{font-size:15px;color:var(--ui-dim);font-variant-numeric:tabular-nums;letter-spacing:.06em}
.btn{pointer-events:auto;background:var(--btn-bg);border:1px solid var(--btn-br);color:var(--ui-dim);
     width:36px;height:36px;border-radius:50%;font-size:15px;line-height:1;cursor:pointer;
     transition:color .3s,opacity .3s}
.btn:hover{color:var(--ui)}
.btn:focus-visible{outline:2px solid var(--ui-dim);outline-offset:2px}
#mute.off{opacity:.4;text-decoration:line-through}
#toast{position:fixed;left:0;right:0;top:26%;text-align:center;font-family:var(--serif);font-style:italic;
       font-size:clamp(20px,3.4vw,31px);letter-spacing:.26em;text-indent:.26em;color:var(--ui);opacity:0;
       transition:opacity 1.2s;pointer-events:none;text-shadow:var(--glow)}
#toast.show{opacity:.92}
#hint{position:fixed;bottom:7%;left:0;right:0;text-align:center;font-size:12px;letter-spacing:.26em;
      text-transform:uppercase;color:var(--ui-faint);opacity:0;transition:opacity 1.2s;pointer-events:none}
body.playing #hint.on{opacity:1}
#veil{position:fixed;inset:0;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .5s}
#veil.on{opacity:1;transition:opacity .1s}
#over{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:14px;opacity:0;pointer-events:none;transition:opacity 1.3s}
#over.show{opacity:1}
#over .ot{font-family:var(--serif);font-style:italic;font-size:clamp(22px,3.6vw,34px);letter-spacing:.22em;
          text-indent:.22em;color:var(--ui);text-shadow:var(--glow)}
#over .os{font-size:13px;letter-spacing:.24em;color:var(--ui-dim);font-variant-numeric:tabular-nums}
#title{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
       gap:18px;transition:opacity 1.4s;cursor:pointer}
#title.hide{opacity:0;pointer-events:none}
#title h1{margin:0;font-family:var(--serif);font-weight:400;letter-spacing:.3em;text-indent:.3em;
          font-size:clamp(30px,6vw,68px);color:var(--ui);text-shadow:var(--glow);text-wrap:balance;
          text-align:center}
#title .sub{font-family:var(--serif);font-style:italic;font-size:clamp(14px,2vw,18px);
            letter-spacing:.3em;text-indent:.3em;color:var(--ui-dim)}
.go{margin-top:26px;font-size:12.5px;letter-spacing:.3em;text-indent:.3em;text-transform:uppercase;
    color:var(--ui-dim)}
#title .bestline{font-size:11.5px;letter-spacing:.2em;color:var(--ui-faint)}
#keys{position:fixed;bottom:26px;left:0;right:0;text-align:center;font-size:10.5px;letter-spacing:.22em;
      text-transform:uppercase;color:var(--ui-faint)}
.pulse{animation:pulse 3.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
@media (prefers-reduced-motion:reduce){.pulse{animation:none;opacity:.8}}
</style>
<canvas id="cv"></canvas>
<div id="hud">
  <div id="tl">
    <div id="dist">0 m</div>
    <div id="ember"><i id="emberfill"></i></div>
    <div id="best"></div>
    <div id="combo"></div>
    <div id="buffs"></div>
  </div>
  <div id="tr">
    <div id="lumens">&#10022; 0</div>
    <button class="btn" id="inkbtn" title="ink &amp; paper (i)">&#9681;</button>
    <button class="btn" id="mute" title="sound (m)">&#9834;</button>
  </div>
  <div id="touch">
    <div class="tcluster left">
      <button class="tbtn" id="tSurge">&laquo;</button>
      <button class="tbtn" id="tEase">&raquo;</button>
    </div>
    <div class="tcluster right">
      <button class="tbtn" id="tRise">&uarr;</button>
      <button class="tbtn" id="tDive">&darr;</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="hint">hold space or &uarr; to ride &mdash; &darr; to dive &mdash; release to float</div>
<div id="veil"></div>
<div id="over">
  <div class="ot" id="overtitle">the night closed in</div>
  <div class="os" id="overstats"></div>
  <div class="go pulse">touch to drift again</div>
  <button class="sbtn" id="btnNew2" style="display:inline-block;margin-top:6px">begin anew</button>
</div>
<div id="title">
  <h1>ALFRED'S HOLIDAY</h1>
  <div class="go pulse" id="titlego">touch anywhere to begin</div>
  <div class="startrow" id="startrow">
    <button class="sbtn" id="btnContinue"></button>
    <button class="sbtn" id="btnNew">begin anew</button>
  </div>
  <div class="bestline" id="bestline"></div>
  <div id="keys">&uarr; &mdash; rise &nbsp;&middot;&nbsp; &darr; &mdash; dive &nbsp;&middot;&nbsp; &larr; &mdash; surge (yes, left) &nbsp;&middot;&nbsp; &rarr; &mdash; ease &nbsp;&middot;&nbsp; never touch a planet's surface &nbsp;&middot;&nbsp; i &mdash; ink &nbsp;&middot;&nbsp; m &mdash; sound</div>
</div>
<script>
'use strict';
/* ============================== setup ============================== */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1,vigN=null,vigI=null;
function buildVignettes(){
  vigN=document.createElement('canvas');vigN.width=W;vigN.height=H;
  let c=vigN.getContext('2d'),R=Math.hypot(W,H)*.62;
  let g=c.createRadialGradient(W/2,H*.42,Math.min(W,H)*.34,W/2,H*.42,R);
  g.addColorStop(0,'rgba(0,0,12,0)');g.addColorStop(1,'rgba(0,0,12,.5)');
  c.fillStyle=g;c.fillRect(0,0,W,H);
  vigI=document.createElement('canvas');vigI.width=W;vigI.height=H;
  c=vigI.getContext('2d');
  g=c.createRadialGradient(W/2,H*.45,Math.min(W,H)*.36,W/2,H*.45,R);
  g.addColorStop(0,'rgba(74,58,34,0)');g.addColorStop(1,'rgba(74,58,34,.22)');
  c.fillStyle=g;c.fillRect(0,0,W,H);
}
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildVignettes();
}
window.addEventListener('resize',resize);resize();

const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const smooth=t=>t*t*(3-2*t);
const NP=new Float32Array(512);for(let i=0;i<512;i++)NP[i]=Math.random();
function noise1(x){const i=Math.floor(x),f=x-i,a=NP[i&511],b=NP[(i+1)&511],t=f*f*(3-2*f);return a+(b-a)*t}
function fbm(x){return noise1(x)*.65+noise1(x*2.13+37.7)*.35}
function lerpC(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]}
function hueRGB(h){h=((h%1)+1)%1;
  const f=n=>{const k=(n+h*6)%6;return 255*(1-Math.max(0,Math.min(k,4-k,1)))|0};
  return[f(5),f(3),f(1)];}
function css(c,a){return'rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+','+(a==null?1:a)+')'}

/* ============================== regions ============================== */
let INK=[42,38,34];                       /* swapped to moonlight while night-mode motifs draw */
const PAPER=[239,231,214],VERM=[193,75,50];
const REGIONS=[
 {name:'The Amber Drift',
  n:{skyT:[8,5,24],skyM:[24,14,52],skyB:[54,26,60],neb1:[255,180,90],neb2:[190,90,160],
     aur1:[90,230,190],aur2:[255,190,110],orb:[255,210,130],moon:[255,225,170],amb:[255,205,140],starA:.8},
  i:{tint:[168,124,64]}},
 {name:'The Glass Deep',
  n:{skyT:[2,7,22],skyM:[6,24,54],skyB:[10,48,80],neb1:[80,200,255],neb2:[60,120,220],
     aur1:[90,255,220],aur2:[90,160,255],orb:[120,230,255],moon:[200,228,255],amb:[140,215,255],starA:.6},
  i:{tint:[80,104,138]}},
 {name:'The Rose Veil',
  n:{skyT:[16,4,26],skyM:[46,12,56],skyB:[86,24,80],neb1:[255,120,180],neb2:[255,150,110],
     aur1:[255,140,200],aur2:[255,190,140],orb:[255,150,190],moon:[255,200,220],amb:[255,160,200],starA:.7},
  i:{tint:[168,86,112]}},
 {name:'The Violet Reach',
  n:{skyT:[10,4,30],skyM:[30,12,70],skyB:[60,24,110],neb1:[150,110,255],neb2:[80,140,255],
     aur1:[140,120,255],aur2:[100,200,255],orb:[170,150,255],moon:[210,200,255],amb:[180,160,255],starA:.9},
  i:{tint:[110,92,156]}},
 {name:'The Sea of Pandas',
  n:{skyT:[3,10,18],skyM:[8,34,40],skyB:[12,60,58],neb1:[90,230,170],neb2:[120,220,230],
     aur1:[110,255,180],aur2:[130,230,255],orb:[140,255,200],moon:[200,255,230],amb:[150,240,210],starA:.65},
  i:{tint:[72,124,88]}},
 {name:"Minx's Cavern",
  n:{skyT:[8,4,14],skyM:[22,12,30],skyB:[44,22,52],neb1:[150,80,160],neb2:[80,50,120],
     aur1:[180,120,220],aur2:[120,80,200],orb:[220,160,255],moon:[210,180,230],amb:[190,140,230],starA:.5},
  i:{tint:[96,70,92]}},
 {name:'The Wandering Peaks',
  n:{skyT:[6,8,18],skyM:[18,26,44],skyB:[48,58,76],neb1:[150,180,210],neb2:[210,180,140],
     aur1:[160,200,230],aur2:[230,200,150],orb:[210,225,255],moon:[235,235,245],amb:[200,215,240],starA:.7},
  i:{tint:[122,142,168]}},
 {name:'The Stone River',
  n:{skyT:[10,8,6],skyM:[26,20,14],skyB:[52,40,28],neb1:[170,130,90],neb2:[120,100,110],
     aur1:[170,170,190],aur2:[220,190,150],orb:[255,200,120],moon:[220,215,225],amb:[200,195,205],starA:.9},
  i:{tint:[110,92,70]}},
 {name:'Rainbow Paradise',
  n:{skyT:[14,6,30],skyM:[40,18,70],skyB:[90,30,90],neb1:[255,110,150],neb2:[90,200,255],
     aur1:[120,255,170],aur2:[255,160,90],orb:[255,220,160],moon:[255,240,220],amb:[255,200,230],starA:1.3},
  i:{tint:[185,105,135]}},
 {name:'The Visitors',
  n:{skyT:[3,8,6],skyM:[8,22,16],skyB:[16,44,34],neb1:[90,255,150],neb2:[130,110,230],
     aur1:[110,255,170],aur2:[160,120,255],orb:[150,255,190],moon:[190,255,210],amb:[140,240,190],starA:1.1},
  i:{tint:[70,112,80]}},
 {name:'The Big Mamma Jamma',
  n:{skyT:[12,8,26],skyM:[36,22,58],skyB:[84,48,86],neb1:[255,170,110],neb2:[130,160,255],
     aur1:[255,200,120],aur2:[160,220,255],orb:[255,215,150],moon:[255,235,210],amb:[255,215,170],starA:1.2},
  i:{tint:[150,96,96]}}
];
REGIONS.forEach((rg,ri)=>rg.n.rb=ri===8?1:ri===10?.5:0);   /* paradise floods; the finale glows */
const REGION_M=700,RN=REGIONS.length;
function regAt(cx){const p2=Math.floor(cx/42/REGION_M);return((p2%RN)+RN)%RN;}
const PHUES=[[255,190,110],[120,220,255],[255,140,190],[160,140,255],[130,240,190],
             [255,230,170],[240,120,120],[180,220,255]];
const REV=[0,0,0,1,0,0,0,.15,0,.7,.3];   /* chance a region's worlds push instead of pull */
const ALLM=['crane','kite','koi','lily','petal','blossom','lantern','moth','bamboo','panda',
  'cat','bat','ghost','eyes','mount','hawk','whale','narwhal','manatee','flow',
  'rpetal','jelly','saucer','squid','eye','weird'];
const REGMOTIFS=[['crane','kite'],['koi','lily'],['petal','blossom'],['lantern','moth'],
  ['bamboo','panda'],['cat','bat','ghost','eyes'],['mount','hawk'],
  ['whale','narwhal','manatee','flow'],
  ['rpetal','koi','panda','cat','lily','lantern','blossom','petal'],
  ['jelly','saucer','squid','eye','weird'],ALLM];
/* each level's sky-body casts its own wash */
const WASHC=[[193,75,50],[180,200,220],[235,140,160],[200,140,120],[224,176,96],
             [200,190,215],[236,236,245],[150,145,150],[250,180,95],[120,220,160],
             [255,200,120]];
let P={},TINT=PAPER,TAMT=.18,rI0=0,rI1=1,rB=0;
/* how deeply each level's colour soaks the paper */
const TINTAMT=[.18,.22,.22,.22,.22,.32,.14,.26,.18,.24,.22];
function blendPal(cx){
  const pos=cx/42/REGION_M,i0=((Math.floor(pos))%RN+RN)%RN,i1=(i0+1)%RN;
  const f=pos-Math.floor(pos),b=smooth(clamp((f-.86)/.14,0,1));
  const A=REGIONS[i0].n,B=REGIONS[i1].n;
  for(const k in A)P[k]=Array.isArray(A[k])?lerpC(A[k],B[k],b):A[k]+(B[k]-A[k])*b;
  TINT=lerpC(REGIONS[i0].i.tint,REGIONS[i1].i.tint,b);
  TAMT=TINTAMT[i0]+(TINTAMT[i1]-TINTAMT[i0])*b;
  /* slow colour breathing — the painting shifts as you watch */
  const br=.5+.5*Math.sin(now*.03);
  P.orb=lerpC(P.orb,P.neb1,.15*br);
  P.aur1=lerpC(P.aur1,P.neb2,.2*(1-br));
  P.amb=lerpC(P.amb,P.neb2,.15*br);
  if(shockT>0){                 /* the colour-shockwave repaints the world */
    const k=.5*Math.min(shockT/2.5,1);
    const hc=hueRGB(shockHue+(8-shockT)*.07);
    TINT=lerpC(TINT,hc,k*.7);
    P.orb=lerpC(P.orb,hc,k);P.aur1=lerpC(P.aur1,hc,k);
    P.amb=lerpC(P.amb,hc,k);P.neb1=lerpC(P.neb1,hc,k*.6);
  }
  rI0=i0;rI1=i1;rB=b;
  return i0;
}

/* ============================== sprites ============================== */
const sprites={};
function q(c){return((c[0]/24|0)*24)+','+((c[1]/24|0)*24)+','+((c[2]/24|0)*24)}
function glowSprite(col){
  const k='g'+q(col);let s=sprites[k];if(s)return s;
  if(Object.keys(sprites).length>160)for(const kk in sprites)delete sprites[kk];
  s=document.createElement('canvas');s.width=s.height=64;
  const c=s.getContext('2d'),g=c.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,css(lerpC(col,[255,255,255],.8),1));
  g.addColorStop(.28,css(col,.5));
  g.addColorStop(1,css(col,0));
  c.fillStyle=g;c.fillRect(0,0,64,64);
  sprites[k]=s;return s;
}
function inkSprite(col){
  const k='i'+q(col);let s=sprites[k];if(s)return s;
  s=document.createElement('canvas');s.width=s.height=64;
  const c=s.getContext('2d'),g=c.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,css(col,.95));g.addColorStop(.55,css(col,.5));g.addColorStop(1,css(col,0));
  c.fillStyle=g;c.fillRect(0,0,64,64);
  sprites[k]=s;return s;
}
function dot(x,y,r,col,a){
  ctx.globalAlpha=a;
  ctx.drawImage(mode==='ink'?inkSprite(col):glowSprite(col),x-r,y-r,r*2,r*2);
  ctx.globalAlpha=1;
}
const paperPat=(()=>{
  const s=document.createElement('canvas');s.width=s.height=160;
  const c=s.getContext('2d');
  for(let i=0;i<520;i++){
    c.fillStyle='rgba('+(rand(30,90)|0)+','+(rand(28,80)|0)+','+(rand(20,60)|0)+','+rand(.02,.07).toFixed(3)+')';
    c.fillRect(rand(0,160),rand(0,160),rand(.6,1.8),rand(.6,1.8));
  }
  for(let i=0;i<26;i++){
    c.strokeStyle='rgba(120,105,80,'+rand(.02,.05).toFixed(3)+')';
    c.lineWidth=rand(.4,.9);const x=rand(0,160),y=rand(0,160);
    c.beginPath();c.moveTo(x,y);c.lineTo(x+rand(-24,24),y+rand(-6,6));c.stroke();
  }
  return ctx.createPattern(s,'repeat');
})();
/* nebula clouds, cached per region */
const nebCache={},nebCacheI={};
function makeNeb(c1,c2){
  const s=document.createElement('canvas');s.width=s.height=512;
  const c=s.getContext('2d');
  for(let k=0;k<14;k++){
    const col=lerpC(k%2?c1:c2,[255,255,255],rand(0,.25));
    const x=rand(40,472),y=rand(40,472),r=rand(60,230);
    const g=c.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,css(col,rand(.05,.1)));g.addColorStop(1,css(col,0));
    c.fillStyle=g;c.fillRect(0,0,512,512);
  }
  return s;
}
function makeNebInk(tint){
  const s=document.createElement('canvas');s.width=s.height=512;
  const c=s.getContext('2d');
  for(let k=0;k<9;k++){
    const x=rand(40,472),y=rand(40,472),r=rand(80,240);
    const g=c.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,css(tint,rand(.07,.12)));g.addColorStop(1,css(tint,0));
    c.fillStyle=g;c.fillRect(0,0,512,512);
  }
  return s;
}
function nebFor(i){if(!nebCache[i])nebCache[i]=makeNeb(REGIONS[i].n.neb1,REGIONS[i].n.neb2);return nebCache[i]}
function makeNebRainbowInk(){
  const s=document.createElement('canvas');s.width=s.height=512;
  const c=s.getContext('2d');
  for(let k=0;k<12;k++){
    const col=lerpC(hueRGB(k/12),PAPER,.25);
    const x=rand(40,472),y=rand(40,472),r=rand(80,220);
    const g=c.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,css(col,rand(.1,.16)));g.addColorStop(1,css(col,0));
    c.fillStyle=g;c.fillRect(0,0,512,512);
  }
  return s;
}
function nebForInk(i){
  if(!nebCacheI[i])
    nebCacheI[i]=REGIONS[i].n.rb>=1?makeNebRainbowInk():makeNebInk(REGIONS[i].i.tint);

      o.ob.ang+=o.ob.spd*dt;
      o.x=o.ob.cx+Math.cos(o.ob.ang)*o.ob.rad;
      o.y=o.ob.cy+Math.sin(o.ob.ang)*o.ob.rad;
    }
    const d=Math.hypot(o.x-wx,o.y-wy);
    const mR=buffStar>0?560:buffMagnet>0?430:120;
    if(d<mR&&state==='play'){
      o.free=true;
      const pull=(1-d/mR)*(buffStar>0?18:buffMagnet>0?15:10)*dt;
      o.x+=(wx-o.x)*pull;o.y+=(wy-o.y)*pull;
    }
    if(d<Math.max(22,30*sizeF)+o.r&&state!=='dead')collect(o);
  }
  for(let i=orbs.length-1;i>=0;i--)
    if(orbs[i].dead||orbs[i].x<camX-W*.6)orbs.splice(i,1);
  for(let i=planets.length-1;i>=0;i--)
    if(planets[i].dead||planets[i].x<camX-W*1.2)planets.splice(i,1);
  /* asteroids — tumbling stones of the river */
  for(let i=asts.length-1;i>=0;i--){
    const a=asts[i];
    a.ph+=a.vr*dt;a.x+=a.vx*dt;
    if(a.x<camX-W*.5){asts.splice(i,1);continue;}
    if(state!=='play')continue;
    const d=Math.hypot(a.x-wx,a.y-wy);
    if(d<a.r+12*sizeF){
      if(buffStar>0){                        /* starlight smashes stone */
        burst(a.x,a.y,true);asts.splice(i,1);
        lumens+=1;totalLumens+=1;
        AU.sparkle();
      }else if(astCd<=0){
        astCd=.9;
        const nx2=(wx-a.x)/(d||1),ny2=(wy-a.y)/(d||1);
        vx+=nx2*260;vy+=ny2*260;
        glow=Math.max(0,glow-.1);
        burst(wx,wy,false);
        AU.pluck(38,{gain:.1,tau:.3,soft:true});
      }
    }
  }
  /* wind-charms */
  for(let i=pows.length-1;i>=0;i--){
    const pw=pows[i];
    if(pw.x<camX-W*.6){pows.splice(i,1);continue;}
    if(state!=='play')continue;
    const d=Math.hypot(pw.x-wx,pw.y+Math.sin(now*1.2+pw.ph)*10-wy);
    if(d<46){
      pows.splice(i,1);
      burst(pw.x,pw.y,true);
      const HINTS={gust:'tailwind — the sky lets you run',
                   moon:'moon-draw — the light comes to you',
                   small:'pebble-light — slip close to the worlds',
                   big:'grand — the light gathers easier',
                   star:'starlight — nothing can touch you'};
      if(pw.t==='gust'){buffSpeed=9;AU.gliss();}
      else if(pw.t==='moon'){buffMagnet=10;AU.sparkle();AU.swell(45,2.5,.05);}
      else if(pw.t==='small'){buffSmall=12;buffBig=0;AU.sparkle();}
      else if(pw.t==='big'){buffBig=12;buffSmall=0;AU.swell(43,2,.05);}
      else{buffStar=8;AU.fanfare();}
      if(!powHints[pw.t]){powHints[pw.t]=1;showHint(HINTS[pw.t],3400);}
    }
  }
  buffSpeed=Math.max(0,buffSpeed-dt);
  buffMagnet=Math.max(0,buffMagnet-dt);
  buffSmall=Math.max(0,buffSmall-dt);
  buffBig=Math.max(0,buffBig-dt);
  buffStar=Math.max(0,buffStar-dt);
  const tgtSz=buffSmall>0?.55:buffBig>0?1.6:1;
  sizeF+=(tgtSz-sizeF)*Math.min(1,dt*4);
  if((buffMagnet>0||buffStar>0)&&state==='play'){
    magPulseT-=dt;
    if(magPulseT<=0){
      magPulseT=buffStar>0?.4:.55;
      rings.push({x:wx,y:wy,r:36,max:buffStar>0?560:430,a0:.18,
        col:buffStar>0?hueRGB(now*.9):null});
    }
  }
  for(let i=comets.length-1;i>=0;i--)
    if(comets[i].x-camX*.09<-320)comets.splice(i,1);
  for(let i=smallsA.length-1;i>=0;i--)
    if(smallsA[i].x-camX*.12<-40)smallsA.splice(i,1);
  for(let i=smallsB.length-1;i>=0;i--)
    if(smallsB[i].x-camX*.3<-80)smallsB.splice(i,1);
  for(let i=motifs.length-1;i>=0;i--){
    const b=motifs[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.ph+=b.fs*dt;
    if(b.t==='petal'||b.t==='blossom')b.x+=Math.sin(b.ph)*14*dt;
    if(b.x-camX*.55<-140||b.y-camY*.55<-H*.5||b.y-camY*.55>H*1.5)motifs.splice(i,1);
  }
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.life-=dt;
    if(p.life<=0){parts.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=Math.pow(.4,dt);p.vy*=Math.pow(.4,dt);
  }
  const re=blendPal(camX);
  const VY=[-7,-26,17,-4,12,-9,-6,3,-14,6,-5][re];
  while(ambs.length<60){
    const l=rand(4,9);
    ambs.push({x:camX*.85+rand(0,W*1.4),y:camY*.85+rand(-40,H+40),vx:rand(-8,4),vy:VY+rand(-4,4),
      swA:rand(4,14),swF:rand(.3,1),ph:rand(0,6.28),life:l,max:l,size:rand(1.2,3.2)});
  }
  for(let i=ambs.length-1;i>=0;i--){
    const p=ambs[i];p.life-=dt;
    p.x+=p.vx*dt;p.y+=(p.vy+Math.sin(now*p.swF+p.ph)*p.swA*.3)*dt;
    const sy=p.y-camY*.85;
    if(p.life<=0||p.x-camX*.85<-60||sy<-80||sy>H+80)ambs.splice(i,1);
  }
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];r.r+=(r.spd||150)*dt;
    if(r.r>=r.max)rings.splice(i,1);
  }
  shockT=Math.max(0,shockT-dt);
  astCd=Math.max(0,astCd-dt);
  const reAbs=Math.floor(camX/42/REGION_M);
  if(reAbs!==lastRe){
    lastRe=reAbs;
    if(state==='play'){
      runChkpt=reAbs;                      /* this run now resumes here */
      const nri=((reAbs%RN)+RN)%RN;
      toast(REGIONS[nri].name);AU.bell();
      /* each region keeps its own company — stragglers bow out */
      const allow=REGMOTIFS[nri];
      for(let i2=motifs.length-1;i2>=0;i2--)
        if(motifs[i2].t!=='crane'&&!allow.includes(motifs[i2].t))motifs.splice(i2,1);
      if(reAbs>chkpt){
        chkpt=reAbs;
        try{localStorage.setItem('drift.chkpt',chkpt);}catch(e){}
        showHint('drift remembered — you may return here',2600);
      }
    }
  }
  if(state==='play'){
    if(m>best)best=m;
    if(!beatBest&&best0>60&&m>best0){beatBest=true;toast('a new farthest drift ✦');}
  }
}

function ribbonPath(i,shift){
  const segs=26,base=H*(.14+i*.11)+shift,pts=[];
  for(let s=0;s<=segs;s++){
    const x=s/segs*W;
    const y=base+Math.sin(x*.004+now*.1+i*2.1)*H*.05
             +fbm(x*.002+now*.025+i*9)*H*.06;
    const w=H*(.03+.018*Math.sin(x*.006+now*.18+i*1.7));
    pts.push([x,y,w]);
  }
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]-pts[0][2]);
  for(const p of pts)ctx.lineTo(p[0],p[1]-p[2]);
  for(let s=pts.length-1;s>=0;s--)ctx.lineTo(pts[s][0],pts[s][1]+pts[s][2]);
  ctx.closePath();
}
function ringArc(sx,sy,R,col,tilt,a0,a1,dim){
  ctx.save();ctx.translate(sx,sy);ctx.rotate(tilt);
  ctx.strokeStyle=css(lerpC(col,[255,255,255],.35),.3*dim);
  ctx.lineWidth=R*.16;
  ctx.beginPath();ctx.ellipse(0,0,R*1.75,R*.48,0,a0,a1);ctx.stroke();
  ctx.strokeStyle=css(col,.5*dim);
  ctx.lineWidth=R*.05;
  ctx.beginPath();ctx.ellipse(0,0,R*1.45,R*.4,0,a0,a1);ctx.stroke();
  ctx.restore();
}
function drawPlanetN(sx,sy,R,col,ringed,tilt,dim,rev){
  ctx.globalCompositeOperation='lighter';
  dot(sx,sy,R*2,col,.28*dim);
  ctx.globalCompositeOperation='source-over';
  if(ringed)ringArc(sx,sy,R,col,tilt,Math.PI,6.283,dim);
  let g;
  if(rev){                       /* hollow worlds that push — dark heart, lit rim */
    g=ctx.createRadialGradient(sx,sy,R*.15,sx,sy,R);
    g.addColorStop(0,css(lerpC(col,[4,3,12],.8),.95));
    g.addColorStop(.72,css(lerpC(col,[10,8,26],.5),.95));
    g.addColorStop(1,css(lerpC(col,[255,255,255],.4),.98));
  }else{
    g=ctx.createRadialGradient(sx-R*.38,sy-R*.38,R*.12,sx,sy,R);
    g.addColorStop(0,css(lerpC(col,[255,255,255],.3),.95));
    g.addColorStop(.5,css(lerpC(col,[12,10,28],.45),.95));
    g.addColorStop(1,css(lerpC(col,[6,5,16],.8),.98));
  }
  ctx.globalAlpha=dim;
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,R,0,6.283);ctx.fill();
  ctx.globalAlpha=1;
  if(ringed)ringArc(sx,sy,R,col,tilt,0,Math.PI,dim);
  ctx.globalCompositeOperation='lighter';
}

    else if(b.t==='manatee')drawManatee(sx,sy,b.s,b.ph);

    else if(b.t==='squid')drawSquid(sx,sy,b.s,b.ph);
    else if(b.t==='eye')drawEye(sx,sy,b.s,b.ph);
    else if(b.t==='saucer')drawSaucer(sx,sy,b.s,b.ph);
    else if(b.t==='rpetal')drawRPetal(sx,sy,b.s,b.ph);
    else if(b.t==='kite')drawKite(sx,sy,b.s,b.ph);
    else if(b.t==='moth')drawMoth(sx,sy,b.s,b.ph);
    else if(b.t==='bat')drawBat(sx,sy,b.s,b.ph);
    else if(b.t==='ghost')drawGhost(sx,sy,b.s,b.ph);
    else if(b.t==='eyes')drawEyesPair(sx,sy,b.s,b.ph);

function drawSkies(){

    const x=W*1.12-rf*W*1.24;
    const y=rI0===3?H*.52-rf*H*.36:H*.34-Math.sin(rf*Math.PI)*H*.16;
    if(x>-W*.25&&x<W*1.25)drawSkyBody(x,y,rI0);
  }
}
function drawSkyBody(x,y,t){
  /* each region hangs its own art in the sky */
  const R=H*.078;
  if(t===0||t===4||t===6||t===8){          /* suns: vermilion, bamboo-gold, cold, ringed */
    const col=t===0?VERM:t===4?[224,176,96]:t===6?[236,236,245]:[250,180,95];
    const r=t===6?R*.7:R;
    dot(x,y,r*1.8,col,.18);
    ctx.fillStyle=css(col,.85);
    ctx.beginPath();ctx.arc(x,y,r,0,6.283);ctx.fill();
    if(t===8){
      for(let k=0;k<5;k++){                  /* colours pulse outward from the sun */
        const q=(now*.25+k/5)%1;
        ctx.strokeStyle=css(hueRGB(q+now*.05),.55*(1-q));
        ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(x,y,r*(1.12+q*1.4),0,6.283);ctx.stroke();
      }
    }else{
      if(t===4){ctx.strokeStyle=css([110,170,120],.4);ctx.lineWidth=2;}
      else{ctx.strokeStyle=css(INK,.16);ctx.lineWidth=1.5;}
      ctx.beginPath();ctx.arc(x,y,r*1.3,0,6.283);ctx.stroke();
    }
  }else if(t===1){                          /* silver moon over the glass deep */
    const col=[205,212,222];
    dot(x,y,R*1.9,col,.15);
    ctx.fillStyle=css(col,.8);
    ctx.beginPath();ctx.arc(x,y,R*1.05,0,6.283);ctx.fill();
    ctx.fillStyle=css(lerpC(col,INK,.18),.5);
    ctx.beginPath();ctx.arc(x-R*.3,y-R*.2,R*.22,0,6.283);ctx.fill();
    ctx.beginPath();ctx.arc(x+R*.25,y+R*.3,R*.15,0,6.283);ctx.fill();
    ctx.strokeStyle=css(INK,.14);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(x,y,R*1.05,0,6.283);ctx.stroke();
  }else if(t===2){                          /* the bloom moon */
    ctx.save();ctx.globalAlpha=.75;
    drawBlossom(x,y,R*1.5,now*.15);
    ctx.restore();
    dot(x,y,R*2.2,[235,140,160],.12);
  }else if(t===3){                          /* the high lantern, rising as it goes */
    ctx.save();ctx.globalAlpha=.8;
    drawLantern(x,y,R*1.1,now*.5);
    ctx.restore();
    dot(x,y,R*2,[224,150,110],.12);
  }else if(t===5){                          /* minx's cat-eye crescent */
    const col=[214,206,218];
    dot(x,y,R*1.7,col,.14);
    ctx.fillStyle=css(col,.85);
    ctx.beginPath();
    ctx.arc(x,y,R,-1.92,1.92,false);
    ctx.arc(x+R*.5,y,R*.72,1.6,-1.6,true);
    ctx.closePath();ctx.fill();
  }else if(t===7){                          /* the eclipse over the stone river */
    dot(x,y,R*2,[210,200,190],.14);
    ctx.fillStyle=css(INK,.85);
    ctx.beginPath();ctx.arc(x,y,R,0,6.283);ctx.fill();
    ctx.strokeStyle=css(VERM,.7);ctx.lineWidth=2.2;
    ctx.beginPath();ctx.arc(x,y,R*1.06,0,6.283);ctx.stroke();
  }else{                                    /* twin moons of the visitors */
    const a=now*.25,sep=R*1.1,col=[150,230,170];
    for(const sgn of[1,-1]){
      const mx=x+Math.cos(a)*sep*sgn,myy=y+Math.sin(a)*sep*.4*sgn;
      dot(mx,myy,R*1.1,col,.16);
      ctx.fillStyle=css(col,.75);
      ctx.beginPath();ctx.arc(mx,myy,R*.5,0,6.283);ctx.fill();
      ctx.strokeStyle=css(INK,.18);ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(mx,myy,R*.5,0,6.283);ctx.stroke();
    }
  }
}
function render(){
  const psx=wx-camX,psy=wy-camY;
  const rfrac=(((camX/42/REGION_M)%1)+1)%1;
  const skyX=W*1.12-rfrac*W*1.24;
  const skyY=rI0===3?H*.52-rfrac*H*.36:H*.34-Math.sin(rfrac*Math.PI)*H*.16;
  const skyW=Math.sin(rfrac*Math.PI);
  const deadFade=state==='dead'?Math.max(0,1-deathT/1.2):1;
  const flick=(state==='play'&&glow<.25)?.72+.28*Math.sin(now*14):1;
  const ga=(.45+.55*glow)*deadFade*flick;
  const nebBr=.5+.5*Math.sin(now*.05),nebBr2=.5+.5*Math.sin(now*.043+2);
  if(mode==='night'){
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,css(P.skyT));g.addColorStop(.55,css(P.skyM));g.addColorStop(1,css(P.skyB));
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    /* nebulas — two drifting layers, crossfading between regions */
    ctx.globalCompositeOperation='lighter';
    drawNebLayer(nebFor(rI0),.05,(1-rB)*(.5+.2*nebBr),1.7);
    drawNebLayer(nebFor(rI0),.11,(1-rB)*(.36+.18*nebBr2),2.3);
    if(rB>0){
      drawNebLayer(nebFor(rI1),.05,rB*(.5+.2*nebBr),1.7);
      drawNebLayer(nebFor(rI1),.11,rB*(.36+.18*nebBr2),2.3);
    }
    ctx.globalCompositeOperation='source-over';
    /* stars wrap in both axes — climb forever, they follow */
    ctx.fillStyle='#fff';
    for(const st of stars){
      const sx=(((st.xf*2*W-camX*.05)%(2*W))+2*W)%(2*W)-W*.25;
      if(sx<-8||sx>W+8)continue;
      const sy=(((st.yf*2*H-camY*.05)%(2*H))+2*H)%(2*H)-H*.25;
      if(sy<-8||sy>H+8)continue;
      ctx.globalAlpha=(0.35+0.55*Math.sin(now*st.sp+st.ph))*Math.min(P.starA,1);
      ctx.fillRect(sx,sy,st.s,st.s);
    }
    if(P.starA>1){
      const ex=(P.starA-1)/.4;
      for(const st of deepStars){
        const sx=(((st.xf*2*W-camX*.03)%(2*W))+2*W)%(2*W)-W*.25;
        if(sx<-8||sx>W+8)continue;
        const sy=(((st.yf*2*H-camY*.03)%(2*H))+2*H)%(2*H)-H*.25;
        if(sy<-8||sy>H+8)continue;
        ctx.globalAlpha=(0.3+0.5*Math.sin(now*st.sp+st.ph))*ex*.8;
        ctx.fillRect(sx,sy,st.s,st.s);
      }
    }
    ctx.globalAlpha=1;
    /* small far-off worlds */
    for(const gp of smallsA){
      const sx=gp.x-camX*.12,sy=gp.y-camY*.12;
      if(sx<-20||sx>W+20)continue;
      dot(sx,sy,gp.R*2.4,gp.col,.22);
      ctx.fillStyle=css(lerpC(gp.col,[14,10,30],.35),.85);
      ctx.beginPath();ctx.arc(sx,sy,gp.R,0,6.283);ctx.fill();
    }
    for(const gp of smallsB){
      const sx=gp.x-camX*.3,sy=gp.y-camY*.3;
      if(sx<-60||sx>W+60)continue;
      drawPlanetN(sx,sy,gp.R,gp.col,gp.ringed,gp.ph,.55);
    }
    ctx.globalCompositeOperation='lighter';
    /* the level's sky crosses with you; comets pass behind */
    ctx.globalCompositeOperation='source-over';
    const inkSv2=INK,tintSv2=TINT;
    INK=lerpC(P.moon,[255,255,255],.25);TINT=lerpC(P.neb1,[44,44,66],.35);
    drawSkies();
    INK=inkSv2;TINT=tintSv2;
    ctx.globalCompositeOperation='lighter';
    for(const cm of comets){
      const sx=cm.x-camX*.09,sy=cm.y-camY*.09;
      if(sx<-260||sx>W+260)continue;
      const ex=sx-Math.cos(cm.ang)*cm.len,ey=sy-Math.sin(cm.ang)*cm.len;
      const lg=ctx.createLinearGradient(sx,sy,ex,ey);
      lg.addColorStop(0,css(P.moon,.5));lg.addColorStop(1,css(P.moon,0));
      ctx.strokeStyle=lg;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
      dot(sx,sy,10,P.moon,.6);
    }
    for(let i=0;i<3;i++){
      ribbonPath(i,Math.sin(now*.045+i*1.7)*H*.07);
      ctx.fillStyle=css(i%2?P.aur2:P.aur1,.05*1.1);
      ctx.fill();
      ctx.fillStyle=css(lerpC(i%2?P.aur2:P.aur1,[255,255,255],.25),.035);
      ctx.fill();
    }
    for(const p of ambs)
      dot(p.x-camX*.85,p.y-camY*.85,p.size*3,P.amb,Math.sin(Math.PI*p.life/p.max)*.4);
    /* the company appears by moonlight — ink swapped for pale light */
    ctx.globalCompositeOperation='source-over';
    const inkSave=INK,tintSave=TINT;
    INK=lerpC(P.moon,[255,255,255],.25);
    TINT=lerpC(P.neb1,[44,44,66],.35);
    drawMotifs();
    INK=inkSave;TINT=tintSave;
    ctx.globalCompositeOperation='lighter';
    /* planets */
    for(const p of planets){
      if(p.dead)continue;
      const sx=p.x-camX,sy=p.y-camY;
      if(sx<-p.R*3||sx>W+p.R*3||sy<-p.R*3||sy>H+p.R*3)continue;
      drawPlanetN(sx,sy,p.R,p.col,p.ringed,p.ph,1,p.rev);
    }
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=css(P.moon,.055);ctx.lineWidth=1;
    for(const p of planets){
      const sx=p.x-camX,sy=p.y-camY,fR=p.R*(p.titan?3:6);
      if(sx<-fR||sx>W+fR)continue;
      ctx.setLineDash(p.rev?[5,7]:[]);
      ctx.beginPath();ctx.arc(sx,sy,fR,0,6.283);ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.globalCompositeOperation='lighter';
    for(const a of asts){
      const sx=a.x-camX,sy=a.y-camY;
      if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
      ctx.globalCompositeOperation='source-over';
      drawAst(a,sx,sy);
      ctx.globalCompositeOperation='lighter';
    }
    for(const o of orbs){
      const sx=o.x-camX;if(sx<-40||sx>W+40)continue;
      const sy=o.y-camY;if(sy<-60||sy>H+60)continue;
      const pr=o.r*(1+.12*Math.sin(now*2+o.ph));
      const noc=P.rb>.02?lerpC(P.orb,hueRGB(o.ph*.16+now*.12),P.rb):P.orb;
      dot(sx,sy,pr*3.2,noc,o.big?.8:.55);
      dot(sx,sy,pr*1.15,lerpC(noc,[255,255,255],.7),.95);
    }
    for(const pw of pows){
      const sx=pw.x-camX;if(sx<-60||sx>W+60)continue;
      const sy=pw.y-camY+Math.sin(now*1.2+pw.ph)*10;
      dot(sx,sy,34,P.moon,.4);
      drawCharm(pw.t,sx,sy,now+pw.ph);
    }
    for(const r of rings){
      ctx.strokeStyle=css(r.col||P.orb,r.a0*(1-r.r/r.max));
      ctx.lineWidth=r.w||2;
      ctx.beginPath();ctx.arc(r.x-camX,r.y-camY,r.r,0,6.283);ctx.stroke();
    }
    for(const p of parts)
      dot(p.x-camX,p.y-camY,p.size*2.4,p.col,(p.life/p.max)*.8);
    const wc=buffStar>0?hueRGB(now*.9):lerpC([210,220,255],P.orb,.45),
          cb=Math.min(combo/20,1);
    for(let i=0;i<trail.length;i++){
      const q2=i/trail.length;
      const tc=buffStar>0?hueRGB(now*.9-q2*.5):wc;
      dot(trail[i].x-camX,trail[i].y-camY,(2+q2*15)*sizeF,tc,q2*.26*ga);
    }
    if(deadFade>0){
      dot(psx,psy,(46+cb*16)*(.55+.45*glow)*sizeF,wc,(.5+cb*.25)*ga);
      dot(psx,psy,15*(.6+.4*glow)*sizeF,lerpC(wc,[255,255,255],.75),.95*deadFade*flick);
    }
    ctx.globalCompositeOperation='source-over';
    ctx.drawImage(vigN,0,0);
    if(state==='play'&&glow<.3){
      ctx.globalAlpha=(0.3-glow)/0.3*.5;ctx.drawImage(vigN,0,0);ctx.globalAlpha=1;
    }
  }else{
    /* ---- ink & paper ---- */
    ctx.fillStyle=css(lerpC(PAPER,TINT,TAMT));ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=.65;ctx.fillStyle=paperPat;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
    /* in paradise, the paper itself takes the rainbow */
    if(P.rb>.02){
      const rg2=ctx.createLinearGradient(0,0,W,H*.4);
      for(let k=0;k<=6;k++)
        rg2.addColorStop(k/6,css(lerpC(hueRGB(k/6+now*.02),PAPER,.2),.15*P.rb));
      ctx.fillStyle=rg2;ctx.fillRect(0,0,W,H);
    }
    /* the sky-body's light swells at mid-level and rests at the borders */
    if(skyW>0){
      const sg=ctx.createRadialGradient(skyX,skyY,0,skyX,skyY,H*.95);
      const sunC=lerpC(WASHC[rI0],TINT,.25);
      sg.addColorStop(0,css(sunC,.04+.11*skyW));sg.addColorStop(.55,css(sunC,.05*skyW));
      sg.addColorStop(1,css(sunC,0));
      ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
    }
    /* faint ink stars — space, in the painting's own language */
    ctx.fillStyle=css(INK,1);
    for(let si=0;si<stars.length;si+=2){
      const st=stars[si];
      const sx=(((st.xf*2*W-camX*.05)%(2*W))+2*W)%(2*W)-W*.25;
      if(sx<-8||sx>W+8)continue;
      const sy=(((st.yf*2*H-camY*.05)%(2*H))+2*H)%(2*H)-H*.25;
      if(sy<-8||sy>H+8)continue;
      ctx.globalAlpha=.1+.08*Math.sin(now*st.sp+st.ph);
      ctx.fillRect(sx,sy,st.s,st.s);
    }
    ctx.globalAlpha=1;
    drawNebLayer(nebForInk(rI0),.05,(1-rB)*(.64+.22*nebBr),1.7);
    if(rB>0)drawNebLayer(nebForInk(rI1),.05,rB*(.64+.22*nebBr),1.7);
    /* the level's sky, crossing with you */
    drawSkies();
    for(const cm of comets){
      const sx=cm.x-camX*.09,sy=cm.y-camY*.09;
      if(sx<-260||sx>W+260)continue;
      const ex=sx-Math.cos(cm.ang)*cm.len,ey=sy-Math.sin(cm.ang)*cm.len;
      ctx.strokeStyle=css(INK,.22);ctx.lineWidth=1.6;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
      ctx.fillStyle=css(VERM,.75);
      ctx.beginPath();ctx.arc(sx,sy,3.2,0,6.283);ctx.fill();
    }
    for(let i=0;i<2;i++){
      ribbonPath(i,Math.sin(now*.045+i*1.7)*H*.07);
      ctx.fillStyle=css(TINT,.055);
      ctx.fill();
    }
    for(const gp of smallsA){
      const sx=gp.x-camX*.12,sy=gp.y-camY*.12;
      if(sx<-20||sx>W+20)continue;
      ctx.fillStyle=css(lerpC(TINT,INK,.3),.4);
      ctx.beginPath();ctx.arc(sx,sy,gp.R,0,6.283);ctx.fill();
    }
    for(const gp of smallsB){
      const sx=gp.x-camX*.3,sy=gp.y-camY*.3;
      if(sx<-60||sx>W+60)continue;
      drawPlanetI(sx,sy,gp.R,gp.ringed,gp.ph,.55);
    }
    drawMotifs();
    for(const a of asts){
      const sx=a.x-camX,sy=a.y-camY;
      if(sx<-60||sx>W+60||sy<-60||sy>H+60)continue;
      drawAst(a,sx,sy);
    }
    /* wind-charms adrift */
    for(const pw of pows){
      const sx=pw.x-camX;if(sx<-60||sx>W+60)continue;
      const sy=pw.y-camY+Math.sin(now*1.2+pw.ph)*10;
      dot(sx,sy,26,VERM,.12);
      drawCharm(pw.t,sx,sy,now+pw.ph);
    }
    for(const p of ambs)
      dot(p.x-camX*.85,p.y-camY*.85,p.size*2,lerpC(TINT,INK,.4),Math.sin(Math.PI*p.life/p.max)*.3);
    for(const p of planets){
      if(p.dead)continue;
      const sx=p.x-camX,sy=p.y-camY;
      if(sx<-p.R*3||sx>W+p.R*3||sy<-p.R*3||sy>H+p.R*3)continue;
      drawPlanetI(sx,sy,p.R,p.ringed,p.ph,1,p.rev);
    }
    ctx.strokeStyle=css(INK,.12);ctx.lineWidth=1;
    for(const p of planets){
      const sx=p.x-camX,sy=p.y-camY,fR=p.R*(p.titan?3:6);
      if(sx<-fR||sx>W+fR)continue;
      ctx.setLineDash(p.rev?[5,7]:[]);
      ctx.beginPath();ctx.arc(sx,sy,fR,0,6.283);ctx.stroke();
    }
    ctx.setLineDash([]);
    for(const o of orbs){
      const sx=o.x-camX;if(sx<-40||sx>W+40)continue;
      const sy=o.y-camY;if(sy<-60||sy>H+60)continue;
      const pr=o.r*(1+.1*Math.sin(now*2+o.ph));
      const oc=P.rb>.02?lerpC(VERM,hueRGB(o.ph*.16+now*.12),P.rb):VERM;
      dot(sx,sy,pr*2.1,oc,.25);
      ctx.fillStyle=css(oc,.9);
      ctx.beginPath();ctx.arc(sx,sy,pr*.62,0,6.283);ctx.fill();
      ctx.strokeStyle=css(oc,.5);ctx.lineWidth=1.4;
      ctx.beginPath();ctx.arc(sx,sy,pr*1.15,0,6.283);ctx.stroke();
    }
    for(const r of rings){
      ctx.strokeStyle=css(r.col||VERM,r.a0*(1-r.r/r.max));
      ctx.lineWidth=r.w||2;
      ctx.beginPath();ctx.arc(r.x-camX,r.y-camY,r.r,0,6.283);ctx.stroke();
    }
    for(const p of parts)
      dot(p.x-camX,p.y-camY,p.size*1.8,p.col,(p.life/p.max)*.75);
    for(let i=0;i<trail.length;i++){
      const q2=i/trail.length;
      ctx.fillStyle=buffStar>0?css(hueRGB(now*.9-q2*.5),q2*.6*ga):css(INK,q2*.5*ga);
      ctx.beginPath();
      ctx.arc(trail[i].x-camX,trail[i].y-camY,(.5+q2*8.5)*sizeF,0,6.283);ctx.fill();
    }
    if(deadFade>0){
      dot(psx,psy,20*(.6+.4*glow)*sizeF,buffStar>0?hueRGB(now*.9):INK,.55*ga);
      ctx.fillStyle=buffStar>0?css(hueRGB(now*.9),.92*deadFade*flick):css(INK,.92*deadFade*flick);
      ctx.beginPath();ctx.arc(psx,psy,9*sizeF,0,6.283);ctx.fill();
      ctx.fillStyle=css(VERM,.95*deadFade*flick);
      ctx.beginPath();ctx.arc(psx,psy,3.6*sizeF,0,6.283);ctx.fill();
    }
    ctx.drawImage(vigI,0,0);
    if(state==='play'&&glow<.3){
      ctx.globalAlpha=(0.3-glow)/0.3*.4;ctx.drawImage(vigI,0,0);ctx.globalAlpha=1;
    }
  }
}

/* ============================== hud & loop ============================== */
let hudT=0,last=performance.now();
function frame(t){
  const dt=Math.min((t-last)/1000,.05);last=t;
  update(dt);
  render();
  hudT+=dt;
  if(hudT>.15){
    hudT=0;
    const m=state==='dead'?deadM:Math.floor(camX/42);
    elDist.textContent=m+' m';
    elBest.textContent=best>0?'farthest '+Math.floor(best)+' m':'';
    elLumens.textContent='✦ '+lumens;
    elEmber.style.transform='scaleX('+Math.max(glow,0).toFixed(3)+')';
    if(combo>=4){elCombo.textContent='wind chain ×'+combo;elCombo.classList.add('on');}
    else elCombo.classList.remove('on');
    const bl=[];
    if(buffSpeed>0)bl.push('tailwind '+Math.ceil(buffSpeed));
    if(buffMagnet>0)bl.push('moon-draw '+Math.ceil(buffMagnet));
    if(buffSmall>0)bl.push('pebble '+Math.ceil(buffSmall));
    if(buffBig>0)bl.push('grand '+Math.ceil(buffBig));
    if(buffStar>0)bl.push('starlight '+Math.ceil(buffStar));
    if(bl.length){elBuffs.textContent=bl.join(' · ');elBuffs.classList.add('on');}
    else elBuffs.classList.remove('on');
  }
  requestAnimationFrame(frame);
}
blendPal(0);
requestAnimationFrame(frame);
</script>
